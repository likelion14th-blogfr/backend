name: Java CI with Gradle and Deploy

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. 자바 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 (테스트 제외하고 빌드 시간을 단축)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 3. 빌드된 Jar 파일을 서버로 전송 및 실행
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.REMOTE_USER }}/deploy"

      # 4. 서버에서 이전 프로세스 죽이고 새로 실행
      - name: Execute Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            fuser -k 8080/tcp || true
            nohup java -jar /home/${{ secrets.REMOTE_USER }}/deploy/build/libs/*.jar > /home/${{ secrets.REMOTE_USER }}/deploy/log.txt 2>&1 &