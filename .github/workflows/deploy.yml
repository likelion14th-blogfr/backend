name: Java CI with Gradle and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. 자바 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 3. 빌드된 실행 가능한 Jar 파일만 서버로 전송
      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.239.77.99
          username: sogang039@SGVDI.local
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "build/libs/blogfr-0.0.1-SNAPSHOT.jar"
          target: "/home/sogang039@SGVDI.local/backend"

      # 4. 서버에서 실행
      - name: Execute Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 163.239.77.99
          username: sogang039@SGVDI.local
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            # 기존 8080 프로세스 종료
            fuser -k 8080/tcp || true
            # 새 서버 실행 (정확한 전체 경로 사용)
            nohup java -jar /home/sogang039@SGVDI.local/backend/build/libs/blogfr-0.0.1-SNAPSHOT.jar > /home/sogang039@SGVDI.local/backend/nohup.out 2>&1 &